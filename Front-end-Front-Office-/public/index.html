<!DOCTYPE html>
<html lang="en-IN">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="./images/ParkEz.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Web site ParkEz for Smart Parking reservation"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>parkEz</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <script>
      (function () {
        var backendUrl = 'https://smartparking-f86d.onrender.com';
        var runningHost = window.location && window.location.hostname ? window.location.hostname : '';
        var isLocalHost =
          runningHost === 'localhost' ||
          runningHost === '127.0.0.1' ||
          runningHost.endsWith('.local');

        if (isLocalHost) {
          backendUrl = 'http://localhost:3001';
        }

        window.RUNTIME_CONFIG = window.RUNTIME_CONFIG || {};
        window.RUNTIME_CONFIG.BACKEND_URL = backendUrl;

        var rewriteUrl = function (value) {
          if (typeof value !== 'string') return value;
          return value.replace(/^https?:\/\/localhost:3001(?=\/|$)/, backendUrl);
        };

        if (typeof window.fetch === 'function') {
          var originalFetch = window.fetch.bind(window);
          window.fetch = function (input, init) {
            if (typeof input === 'string') {
              return originalFetch(rewriteUrl(input), init);
            }

            if (typeof Request !== 'undefined' && input instanceof Request) {
              return originalFetch(new Request(rewriteUrl(input.url), input), init);
            }

            return originalFetch(input, init);
          };
        }

        if (typeof XMLHttpRequest !== 'undefined') {
          var originalOpen = XMLHttpRequest.prototype.open;
          XMLHttpRequest.prototype.open = function (method, url) {
            return originalOpen.apply(this, [method, rewriteUrl(url)].concat([].slice.call(arguments, 2)));
          };
        }
      })();
    </script>
    
    <!-- Runtime Configuration Injection -->
    <script>
      (function() {
        console.log('[Init] Starting runtime config injection...');
        const hostname = window.location.hostname;
        console.log('[Init] Current hostname:', hostname);
        
        const isLocalDev = 
          hostname === 'localhost' || 
          hostname === '127.0.0.1' ||
          hostname.endsWith('.local');
        
        const backendUrl = isLocalDev 
          ? 'http://localhost:3001'
          : 'https://smartparking-f86d.onrender.com';
        
        window.RUNTIME_CONFIG = {
          BACKEND_URL: backendUrl
        };
        
        console.log('[Init] ✓ RUNTIME_CONFIG.BACKEND_URL set to:', window.RUNTIME_CONFIG.BACKEND_URL);
        console.log('[Init] isLocalDev:', isLocalDev);
      })();
    </script>
    
    <div id="root"></div>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->

    <script
      src="https://cdn.jsdelivr.net/npm/react/umd/react.production.min.js"
      crossorigin
    ></script>

    <script
      src="https://cdn.jsdelivr.net/npm/react-dom/umd/react-dom.production.min.js"
      crossorigin
    ></script>

  </body>
</html>
